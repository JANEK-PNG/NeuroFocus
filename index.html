<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#F4EFE6" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>NeuroFocus — focus, calmly</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..600;1,9..144,300..600&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    /* Light · default · warm off-white + soft chromatic wash */
    --paper:        #F4EFE6;
    --paper-elev:   #FBF7EE;
    --ink:          #2B2620;
    --ink-soft:     #5A5147;
    --ink-muted:    #8A7F70;
    --ink-faint:    #B8AE9C;
    --line:         rgba(43,38,32,.10);
    --line-strong:  rgba(43,38,32,.18);

    /* Atmospheric wash colors */
    --wash-a: #F3D9C0;
    --wash-b: #E4C8C2;
    --wash-c: #C9D2C4;
    --wash-d: #E8DCC0;

    /* Single accent */
    --accent:       #6E7F6A;
    --accent-deep:  #4E5C4B;
    --accent-soft:  rgba(110,127,106,.10);
    --accent-glow:  rgba(110,127,106,.20);
    --success:      #4E5C4B;
    --danger:       #B85C4C;

    /* Band colors kept as tokens (JS reads BANDS[].hex hard-coded; these
       drive any --accent overrides JS sets on the root) */
    --delta: #6F7CA8;       --delta-glow: rgba(111,124,168,.18);
    --theta: #8C7BAE;       --theta-glow: rgba(140,123,174,.18);
    --alpha: #6E7F6A;       --alpha-glow: rgba(110,127,106,.18);
    --beta:  #B59065;       --beta-glow:  rgba(181,144,101,.18);
    --gamma: #B85C4C;       --gamma-glow: rgba(184,92,76,.18);

    --serif: 'Fraunces', Georgia, serif;
    --sans:  'Manrope', system-ui, -apple-system, sans-serif;

    --r-sm: 12px;
    --r:    20px;
    --r-lg: 28px;
    --r-xl: 36px;
  }
  [data-theme="dark"] {
    --paper:        #15110D;
    --paper-elev:   #1D1814;
    --ink:          #ECE6D8;
    --ink-soft:     #B8AE9C;
    --ink-muted:    #786F60;
    --ink-faint:    #4A443A;
    --line:         rgba(236,230,216,.08);
    --line-strong:  rgba(236,230,216,.14);
    --wash-a: #3A2A28;
    --wash-b: #2E2A38;
    --wash-c: #25302C;
    --wash-d: #2A2418;
    --accent:       #9DB098;
    --accent-deep:  #B6C6B0;
    --accent-soft:  rgba(157,176,152,.10);
    --accent-glow:  rgba(157,176,152,.22);
    --success:      #B6C6B0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--paper); color: var(--ink); font-family: var(--sans); font-weight: 400; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
  body {
    min-height: 100vh;
    overflow-x: hidden;
    overflow-y: auto;
    position: relative;
  }

  /* ─── Hide legacy bg wave (kept in DOM for JS) ─── */
  #bg-wave, #bg-wave-svg { display: none !important; }

  /* ─── Atmospheric wash · drifting chromatic gradient ─── */
  .atmosphere {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    overflow: hidden;
  }
  .atmosphere::before,
  .atmosphere::after {
    content: ""; position: absolute;
    width: 110vmin; height: 110vmin; border-radius: 50%;
    filter: blur(80px);
    opacity: .55;
    mix-blend-mode: multiply;
  }
  [data-theme="dark"] .atmosphere::before,
  [data-theme="dark"] .atmosphere::after {
    mix-blend-mode: screen;
    opacity: .35;
  }
  .atmosphere::before {
    background: radial-gradient(circle, var(--wash-a) 0%, transparent 60%);
    top: -30vmin; left: -20vmin;
    animation: driftA 28s ease-in-out infinite alternate;
  }
  .atmosphere::after {
    background: radial-gradient(circle, var(--wash-c) 0%, transparent 60%);
    bottom: -30vmin; right: -25vmin;
    animation: driftB 36s ease-in-out infinite alternate;
  }
  .wash-c {
    position: fixed; top: 30%; left: 50%; transform: translateX(-50%);
    width: 80vmin; height: 80vmin; border-radius: 50%;
    background: radial-gradient(circle, var(--wash-b) 0%, transparent 65%);
    filter: blur(90px); opacity: .35; mix-blend-mode: multiply;
    z-index: 0; pointer-events: none;
    animation: driftC 44s ease-in-out infinite alternate;
  }
  [data-theme="dark"] .wash-c { mix-blend-mode: screen; opacity: .25; }

  @keyframes driftA { from { transform: translate(0,0) scale(1); } to { transform: translate(8vmin,6vmin) scale(1.1); } }
  @keyframes driftB { from { transform: translate(0,0) scale(1); } to { transform: translate(-10vmin,-4vmin) scale(1.08); } }
  @keyframes driftC { from { transform: translate(-50%,0) scale(1); } to { transform: translate(-46%,4vmin) scale(1.12); } }

  @media (prefers-reduced-motion: reduce) {
    .atmosphere::before, .atmosphere::after, .wash-c { animation: none; }
  }

  /* ─── Stage layout ─── */
  .stage {
    position: relative; z-index: 1;
    min-height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr auto;
    padding: 28px 28px 24px;
    max-width: 760px;
    margin: 0 auto;
  }

  /* ─── Top bar ─── */
  .topbar {
    display: flex; justify-content: space-between; align-items: center;
  }
  .brand-mini {
    font-family: var(--serif); font-style: italic; font-weight: 400;
    font-size: 20px; color: var(--ink); letter-spacing: .005em;
  }
  .top-actions { display: flex; gap: 10px; align-items: center; }
  .icon-btn-quiet {
    width: 38px; height: 38px; border-radius: 50%;
    border: 1px solid var(--line); background: transparent;
    display: flex; align-items: center; justify-content: center;
    color: var(--ink-muted); cursor: pointer;
    transition: color 180ms ease, border-color 180ms ease, background 180ms ease;
  }
  .icon-btn-quiet:hover { color: var(--ink); border-color: var(--line-strong); background: var(--paper-elev); }
  .icon-btn-quiet svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 1.4; }
  /* Theme icon swap: sun in light, moon in dark */
  .theme-icon-moon { display: none; }
  [data-theme="dark"] .theme-icon-sun { display: none; }
  [data-theme="dark"] .theme-icon-moon { display: inline-block; }

  /* ─── Hide legacy header (kept in DOM but unused visually) ─── */
  .theme-slider { /* keep clickable invisibly so the toggle still works if JS hits it */
    position: absolute; left: -10000px; opacity: 0; pointer-events: auto;
  }

  /* ─── Center stage — the calm screen ─── */
  .calm {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 28px;
    padding: 40px 16px 28px;
  }
  .session-label {
    font-family: var(--serif); font-style: italic;
    font-size: 17px; color: var(--ink-muted);
  }
  .time-display {
    font-family: var(--serif);
    font-weight: 300;
    font-style: normal;
    font-variation-settings: 'opsz' 144;
    font-size: clamp(96px, 18vw, 168px);
    line-height: .95;
    letter-spacing: -.025em;
    color: var(--ink);
    font-feature-settings: 'tnum';
    user-select: none;
    text-align: center;
  }
  .phase-line {
    font-family: var(--serif); font-style: italic; font-weight: 400;
    font-size: 18px; color: var(--ink-soft);
  }
  .ring-meta {
    font-family: var(--sans);
    font-size: 12px;
    color: var(--ink-muted);
    letter-spacing: .08em;
    text-transform: uppercase;
  }

  /* ─── Play button — the only required action ─── */
  .play-btn-calm {
    width: 88px; height: 88px;
    border-radius: 50%;
    background: var(--ink);
    color: var(--paper);
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 16px 40px -16px rgba(43,38,32,.45);
    transition: transform 220ms ease, box-shadow 220ms ease;
    position: relative;
    padding: 0;
  }
  .play-btn-calm:hover { transform: translateY(-2px); box-shadow: 0 22px 48px -18px rgba(43,38,32,.55); }
  .play-btn-calm:active { transform: translateY(0); }
  .play-btn-calm::before {
    content: ""; position: absolute; inset: -10px;
    border-radius: 50%;
    border: 1px solid var(--line);
    animation: breathe 5s ease-in-out infinite;
  }
  .play-btn-calm svg { width: 30px; height: 30px; fill: currentColor; }
  .play-btn-calm #play-icon { margin-left: 4px; }
  @keyframes breathe {
    0%, 100% { transform: scale(1); opacity: .8; }
    50%      { transform: scale(1.06); opacity: .35; }
  }
  @media (prefers-reduced-motion: reduce) {
    .play-btn-calm::before { animation: none; }
  }

  /* Reset / skip — secondary controls, visible only while running */
  .run-controls {
    display: flex; gap: 12px; opacity: 0;
    pointer-events: none; transition: opacity 220ms ease;
  }
  .run-controls.running { opacity: 1; pointer-events: auto; }
  .side-control {
    width: 38px; height: 38px; border-radius: 50%;
    border: 1px solid var(--line); background: transparent;
    color: var(--ink-muted); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .side-control svg { width: 14px; height: 14px; }
  .side-control:hover { color: var(--ink); border-color: var(--line-strong); }
  .side-control.success { color: var(--accent-deep); border-color: var(--accent); }

  /* Meta strip — sits below the play button */
  .meta-strip {
    display: flex; gap: 22px; align-items: center;
    color: var(--ink-muted); font-size: 12px; letter-spacing: .06em;
    flex-wrap: wrap; justify-content: center;
  }
  .meta-strip .pip { width: 4px; height: 4px; border-radius: 50%; background: var(--ink-faint); }
  .meta-strip strong { color: var(--ink-soft); font-weight: 500; }

  /* ─── Drawer handle ─── */
  .drawer-handle {
    margin-top: 32px;
    align-self: center;
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    cursor: pointer;
    padding: 12px 18px;
    color: var(--ink-muted);
    transition: color 180ms ease;
    user-select: none;
  }
  .drawer-handle:hover { color: var(--ink); }
  .drawer-handle .grab { width: 36px; height: 4px; border-radius: 2px; background: var(--ink-faint); opacity: .6; }
  .drawer-handle .lbl { font-family: var(--serif); font-style: italic; font-size: 13px; letter-spacing: .02em; }

  /* ─── Drawer ─── */
  .drawer {
    position: fixed; left: 0; right: 0; bottom: 0;
    background: var(--paper-elev);
    border-top: 1px solid var(--line);
    border-radius: var(--r-xl) var(--r-xl) 0 0;
    box-shadow: 0 -24px 60px -28px rgba(43,38,32,.22);
    padding: 18px 28px 28px;
    z-index: 50;
    transform: translateY(calc(100% - 56px));
    transition: transform 380ms cubic-bezier(.2,.7,.2,1);
    max-height: 80vh;
    overflow-y: auto;
  }
  .drawer.open { transform: translateY(0); }
  .drawer-grab {
    width: 44px; height: 5px; border-radius: 3px;
    background: var(--ink-faint); opacity: .5;
    margin: 0 auto 14px; cursor: pointer;
  }
  .drawer-tabs {
    display: flex; gap: 6px; justify-content: center;
    margin-bottom: 22px; flex-wrap: wrap;
  }
  .drawer-tab {
    padding: 8px 16px; border-radius: 999px;
    border: 1px solid var(--line); background: transparent;
    font-family: var(--sans); font-size: 12px; color: var(--ink-muted);
    cursor: pointer; letter-spacing: .01em;
    transition: all 180ms ease;
  }
  .drawer-tab:hover { color: var(--ink); border-color: var(--line-strong); }
  .drawer-tab.active {
    background: var(--ink); color: var(--paper); border-color: var(--ink);
  }
  .drawer-content {
    max-width: 720px; margin: 0 auto;
  }
  .panel-section { display: none; }
  .panel-section.active { display: block; }
  .panel-title {
    font-family: var(--serif); font-style: italic;
    font-size: 22px; color: var(--ink); margin-bottom: 14px;
  }

  /* ─── Drawer · sound tab ─── */
  .sound-row {
    display: grid; grid-template-columns: 96px 1fr 44px; gap: 16px;
    align-items: center;
    padding: 12px 0;
    border-bottom: 1px solid var(--line);
  }
  .sound-row:last-child { border-bottom: none; }
  .sound-label {
    font-family: var(--serif); font-style: italic;
    font-size: 16px; color: var(--ink);
  }
  /* Wrap legacy <input class="fader"> sliders in calm style */
  .sound-row input[type="range"], .fader {
    -webkit-appearance: none; appearance: none;
    width: 100%; height: 4px;
    background: var(--line);
    border-radius: 999px;
    outline: none;
    cursor: pointer;
  }
  .sound-row input[type="range"]::-webkit-slider-thumb,
  .fader::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px; height: 16px; border-radius: 50%;
    background: var(--paper); border: 1.5px solid var(--accent);
    box-shadow: 0 2px 6px rgba(43,38,32,.18);
    cursor: pointer;
  }
  .sound-row input[type="range"]::-moz-range-thumb,
  .fader::-moz-range-thumb {
    width: 16px; height: 16px; border-radius: 50%;
    background: var(--paper); border: 1.5px solid var(--accent);
    box-shadow: 0 2px 6px rgba(43,38,32,.18);
    cursor: pointer;
  }
  .sound-icon-cell {
    width: 36px; height: 36px; border-radius: 50%;
    border: 1px solid var(--line);
    display: flex; align-items: center; justify-content: center;
    color: var(--ink-muted);
  }
  .sound-icon-cell svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 1.4; }
  .sound-icon-cell.on { color: var(--accent-deep); border-color: var(--accent); background: var(--accent-soft); }

  /* Sound panels live inline inside drawer tabs */
  .mixer-panel, .nature-panel, .radio-panel, .entrainment-panel {
    position: static;
    box-shadow: none;
    background: transparent;
    border: none;
    padding: 0;
    width: 100%;
    max-width: none;
    transform: none;
    opacity: 1;
    visibility: visible;
    display: block;
    margin: 0;
  }
  .mixer-panel .nature-panel-head,
  .nature-panel .nature-panel-head,
  .radio-panel .nature-panel-head,
  .entrainment-panel .nature-panel-head {
    display: none;
  }
  .mixer-faders {
    display: flex; flex-direction: column; gap: 0;
  }
  .fader-divider { display: none; }
  .fader-channel {
    display: grid; grid-template-columns: 96px 1fr 44px; gap: 16px;
    align-items: center;
    padding: 12px 0;
    border-bottom: 1px solid var(--line);
  }
  .fader-channel:last-child { border-bottom: none; }
  .fader-channel .fader-icon { display: none; }
  .fader-channel .fader-label {
    font-family: var(--serif); font-style: italic;
    font-size: 16px; color: var(--ink);
    order: -1;
  }
  .fader-channel .fader-value {
    text-align: right; font-family: var(--sans); font-size: 12px;
    color: var(--ink-muted); letter-spacing: .04em;
  }
  .fader-channel .fader-track {
    display: contents;
  }
  .fader-channel .fader-track .fader { grid-column: 2; }

  /* ─── Drawer · presets tab ─── */
  .interval-grid {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
  }
  .interval-card {
    background: transparent;
    border: 1px solid var(--line);
    border-radius: var(--r);
    padding: 16px 12px;
    cursor: pointer;
    display: flex; flex-direction: column; gap: 6px; align-items: center;
    font-family: var(--sans);
    color: var(--ink);
    transition: all 180ms ease;
  }
  .interval-card:hover { background: var(--paper); border-color: var(--line-strong); }
  .interval-card.active {
    background: var(--accent-soft);
    border-color: var(--accent);
    color: var(--accent-deep);
  }
  .interval-card .label {
    font-family: var(--serif); font-style: italic; font-size: 16px;
  }
  .interval-card .val {
    font-family: var(--sans); font-size: 11px; color: var(--ink-muted); letter-spacing: .04em;
  }
  .interval-card.active .val { color: var(--accent-deep); }
  .interval-card.custom-card svg {
    width: 18px; height: 18px; color: var(--ink-muted);
  }
  .interval-card.custom-card.active svg { color: var(--accent-deep); }

  .entrain-list {
    display: flex; flex-direction: column; gap: 8px;
    margin-top: 16px;
  }
  .entrain-item {
    display: grid; grid-template-columns: 32px 1fr 18px; gap: 14px;
    align-items: center;
    padding: 14px 16px;
    border: 1px solid var(--line); border-radius: var(--r);
    background: transparent; cursor: pointer; text-align: left;
    font-family: var(--sans); color: var(--ink);
    transition: all 180ms ease;
  }
  .entrain-item:hover { background: var(--paper); border-color: var(--line-strong); }
  .entrain-item.active {
    background: var(--accent-soft); border-color: var(--accent);
  }
  .entrain-item .icon svg { width: 20px; height: 20px; stroke: var(--ink-muted); }
  .entrain-item.active .icon svg { stroke: var(--accent-deep); }
  .entrain-item .info { display: flex; flex-direction: column; gap: 2px; }
  .entrain-item .name { font-family: var(--serif); font-style: italic; font-size: 17px; }
  .entrain-item .desc { font-size: 12px; color: var(--ink-muted); }
  .entrain-item .check { width: 18px; height: 18px; stroke: var(--accent-deep); fill: none; opacity: 0; }
  .entrain-item.active .check { opacity: 1; }

  /* ─── Drawer · journey tab ─── */
  .journey-bar {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
    margin-bottom: 18px;
  }
  .journey-btn {
    background: transparent;
    border: 1px solid var(--line);
    border-radius: var(--r);
    padding: 14px 8px;
    cursor: pointer; font-family: var(--sans);
    display: flex; flex-direction: column; gap: 4px; align-items: center;
    color: var(--ink);
    transition: all 180ms ease;
  }
  .journey-btn:hover { background: var(--paper); border-color: var(--line-strong); }
  .journey-btn.active { background: var(--accent-soft); border-color: var(--accent); color: var(--accent-deep); }
  .journey-btn .icon { font-size: 18px; }
  .journey-btn .label { font-family: var(--serif); font-style: italic; font-size: 14px; }

  .band-selector-wrap { position: relative; padding-top: 6px; }
  .band-selector-wrap.hidden { display: none; }
  .band-selector {
    display: flex; gap: 8px; overflow-x: auto;
    padding: 4px 4px 8px; scroll-behavior: smooth;
    -ms-overflow-style: none; scrollbar-width: none;
  }
  .band-selector::-webkit-scrollbar { display: none; }
  .band-pill {
    flex-shrink: 0;
    display: flex; align-items: center; gap: 8px;
    padding: 10px 14px;
    border: 1px solid var(--line); border-radius: 999px;
    background: transparent; cursor: pointer;
    font-family: var(--sans); color: var(--ink);
    transition: all 180ms ease;
  }
  .band-pill:hover { background: var(--paper); border-color: var(--line-strong); }
  .band-pill.active {
    background: var(--accent-soft); border-color: var(--accent); color: var(--accent-deep);
  }
  .band-pill .band-dot { width: 8px; height: 8px; border-radius: 50%; }
  .band-pill .band-name { font-family: var(--serif); font-style: italic; font-size: 15px; }
  .band-pill .band-hz { font-size: 11px; color: var(--ink-muted); letter-spacing: .04em; }
  .band-pill.active .band-hz { color: var(--accent-deep); }

  .journey-timeline { display: flex; gap: 0; padding: 8px 4px; }
  .journey-timeline.hidden { display: none; }
  .timeline-stage {
    flex: 1; position: relative;
    display: flex; flex-direction: column; align-items: center; gap: 6px;
  }
  .timeline-connector {
    position: absolute; top: 14px; left: 50%; right: -50%; height: 1px;
    background: var(--line); z-index: 0;
  }
  .timeline-stage:last-child .timeline-connector { display: none; }
  .timeline-node {
    width: 28px; height: 28px; border-radius: 50%;
    border: 1.5px solid var(--ink-faint);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--sans); font-size: 12px; color: var(--ink-soft);
    background: var(--paper-elev); position: relative; z-index: 1;
  }
  .timeline-stage.current .timeline-node { color: #fff; }
  .timeline-stage.done .timeline-node { background: var(--accent); border-color: var(--accent); color: #fff; }
  .timeline-label {
    font-family: var(--serif); font-style: italic; font-size: 13px; color: var(--ink-soft);
  }
  .timeline-hz {
    font-size: 10px; color: var(--ink-muted); letter-spacing: .04em;
  }

  /* ─── Drawer · notes tab (brain dump) ─── */
  .section .section-head {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 12px;
  }
  .section-title {
    font-family: var(--serif); font-style: italic; font-size: 22px;
    color: var(--ink); margin: 0;
  }
  .dump-box { display: flex; flex-direction: column; gap: 12px; }
  .dump-input-row { display: flex; gap: 8px; }
  #dump-input {
    flex: 1;
    border: 1px solid var(--line); border-radius: var(--r-sm);
    padding: 12px 14px;
    background: var(--paper);
    font-family: var(--serif); font-style: italic; font-size: 15px;
    color: var(--ink);
    outline: none;
  }
  #dump-input::placeholder { color: var(--ink-faint); }
  #dump-input:focus { border-color: var(--accent); }
  .dump-add-btn {
    width: 44px; height: 44px; border-radius: 50%;
    border: none; background: var(--ink); color: var(--paper);
    cursor: pointer; font-size: 18px; line-height: 1;
  }
  .dump-list { list-style: none; padding: 0; display: flex; flex-direction: column; gap: 6px; }
  .dump-item {
    display: grid; grid-template-columns: 18px 1fr 24px; gap: 10px;
    align-items: center;
    padding: 10px 14px;
    border-radius: var(--r-sm);
    background: var(--paper);
    color: var(--ink-soft); font-size: 14px;
    cursor: grab;
    transition: background 180ms ease;
  }
  .dump-item:hover { background: var(--paper-elev); }
  .dump-item.dragging-source { opacity: 0.3; }
  .dump-item.collapsing { opacity: 0; transform: scale(.95); transition: all 220ms ease; }
  .drag-handle { color: var(--ink-faint); font-size: 11px; cursor: grab; user-select: none; line-height: 1; }
  .dump-item button {
    background: transparent; border: none; color: var(--ink-faint); cursor: pointer;
    font-size: 18px; line-height: 1; padding: 0;
  }
  .dump-item button:hover { color: var(--danger); }
  .dump-empty {
    font-family: var(--serif); font-style: italic; color: var(--ink-faint);
    text-align: center; padding: 12px 0;
  }
  .dump-ghost {
    position: fixed; padding: 10px 14px;
    background: var(--paper-elev); border: 1px solid var(--line); border-radius: var(--r-sm);
    color: var(--ink-soft); font-size: 14px;
    pointer-events: none; box-shadow: 0 12px 30px -10px rgba(43,38,32,.3);
    transition: transform 220ms ease;
  }
  .dump-ghost.over-trash { background: rgba(184,92,76,.10); border-color: var(--danger); color: var(--danger); }
  .dump-ghost.crumpling { animation: crumple .54s forwards; }
  @keyframes crumple {
    to { transform: scale(.2) rotate(40deg); opacity: 0; }
  }

  /* ─── Trash zone ─── */
  .trash-zone {
    position: fixed; bottom: 24px; right: 24px;
    width: 64px; height: 64px; border-radius: 50%;
    border: 1.5px dashed var(--ink-faint);
    background: var(--paper-elev);
    display: none; align-items: center; justify-content: center;
    color: var(--ink-muted); z-index: 80;
    flex-direction: column; gap: 2px;
  }
  .trash-zone.show { display: flex; }
  .trash-zone.active { border-color: var(--danger); color: var(--danger); border-style: solid; }
  .trash-zone svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 1.6; }
  .trash-label { font-size: 8px; letter-spacing: .1em; text-transform: uppercase; }

  /* ─── Modal ─── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(43,38,32,.36);
    backdrop-filter: blur(8px);
    z-index: 200;
    display: none; align-items: center; justify-content: center;
    padding: 24px;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: var(--paper-elev);
    border-radius: var(--r-lg);
    padding: 32px 32px 28px;
    max-width: 560px; width: 100%;
    max-height: 80vh; overflow-y: auto;
    position: relative;
    box-shadow: 0 40px 80px -30px rgba(0,0,0,.4);
  }
  .modal-handle {
    width: 36px; height: 4px; border-radius: 2px;
    background: var(--ink-faint); opacity: .4;
    margin: 0 auto 18px;
  }
  .modal-close {
    position: absolute; top: 14px; right: 14px;
    width: 32px; height: 32px; border-radius: 50%;
    border: 1px solid var(--line); background: transparent;
    color: var(--ink-muted); cursor: pointer; font-size: 18px; line-height: 1;
  }
  .modal h2 {
    font-family: var(--serif); font-style: italic; font-weight: 500;
    font-size: 32px; color: var(--ink); margin-bottom: 4px;
    display: flex; align-items: center; gap: 10px;
  }
  .modal h3 {
    font-family: var(--serif); font-style: italic; font-weight: 500;
    font-size: 18px; color: var(--ink); margin-top: 18px; margin-bottom: 6px;
  }
  .modal p { color: var(--ink-soft); line-height: 1.6; margin-bottom: 10px; font-size: 14px; }
  .modal-hz { font-size: 13px; color: var(--ink-muted); letter-spacing: .04em; }
  .settings-row { margin-bottom: 18px; }
  .settings-row .label-row {
    display: flex; justify-content: space-between; margin-bottom: 6px;
    font-family: var(--sans); font-size: 13px; color: var(--ink-soft);
  }
  .settings-row input[type="range"] { width: 100%; }
  .settings-row .bounds {
    display: flex; justify-content: space-between;
    font-size: 10px; color: var(--ink-faint); letter-spacing: .04em; margin-top: 4px;
  }
  .settings-link {
    background: transparent; border: 1px solid var(--line);
    color: var(--accent-deep); padding: 10px 16px;
    border-radius: 999px; cursor: pointer; margin-top: 14px;
    font-family: var(--sans); font-size: 13px;
  }
  .settings-link:hover { background: var(--accent-soft); border-color: var(--accent); }
  .band-dot { display: inline-block; vertical-align: middle; }

  /* ─── Hide legacy structures we don't render anymore ─── */
  .bg-wave, .timer-card, .ring-wrap, .metrics-strip, .mode-label-spacer,
  .ring-svg, .ring-center, .time-group, .play-row,
  .ring-reset, .play-btn:not(.play-btn-calm), .mode-switcher,
  /* Items we keep alive for JS but render zero-size */
  .hidden-keep {
    position: absolute !important;
    width: 1px !important; height: 1px !important;
    overflow: hidden !important;
    clip: rect(0 0 0 0); white-space: nowrap;
  }

  /* ─── Mobile (≤640px) ─── */
  @media (max-width: 640px) {
    .stage { padding: 0; }
    .topbar { padding: 18px 20px 0; }
    .brand-mini { font-size: 17px; }
    .calm { padding: 0 20px; gap: 18px; }
    .session-label { font-size: 11px; letter-spacing: .18em; }
    .phase-line { font-size: 15px; }
    .play-btn-calm { width: 76px; height: 76px; }
    .play-btn-calm svg { width: 26px; height: 26px; }
    .meta-strip { font-size: 11px; gap: 10px; flex-wrap: wrap; justify-content: center; }
    .mode-switcher { transform: scale(.9); }
    /* Drawer becomes near-full-screen sheet when open */
    .drawer {
      padding: 14px 18px 22px;
      max-height: 92vh;
      transform: translateY(calc(100% - 52px));
    }
    .drawer.open { transform: translateY(0); }
    .drawer-handle { padding: 12px 0; font-size: 12px; }
    .drawer-tabs { gap: 4px; margin-bottom: 16px; }
    .drawer-tab { padding: 7px 12px; font-size: 11px; }
    .panel-title { font-size: 19px; margin-bottom: 10px; }
    /* Presets: 2 columns instead of 4 */
    .interval-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .interval-card { padding: 14px 10px; }
    /* Fader rows more compact */
    .fader-channel { grid-template-columns: 80px 1fr 36px; gap: 12px; padding: 10px 0; }
    .fader-channel .fader-label { font-size: 13px; }
    /* Sound icon grid 3-up */
    .nature-grid, .radio-list, #nature-grid, #radio-list {
      grid-template-columns: repeat(3, 1fr) !important;
    }
    /* Brain dump: full-width input */
    .dump-form { flex-direction: column; gap: 8px; }
    .dump-form input { width: 100%; }
    .dump-form button { width: 100%; }
    /* Modal: edge-to-edge with safe insets */
    .modal-content {
      max-width: 100%;
      margin: 20px;
      padding: 24px 20px;
      max-height: calc(100vh - 40px);
      overflow-y: auto;
    }
    /* Atmosphere blobs smaller on phone to avoid washout */
    .atmosphere::before, .atmosphere::after, .wash-c {
      filter: blur(50px);
      opacity: .55;
    }
  }
</style>
</head>
<body>

<!-- Atmospheric wash (drifting chromatic gradients) -->
<div class="atmosphere"></div>
<div class="wash-c"></div>

<!-- Legacy bg-wave SVG — hidden by CSS, kept so drawWave() / drawBgWave() JS doesn't throw -->
<div class="bg-wave" id="bg-wave" aria-hidden="true">
  <svg id="bg-wave-svg" preserveAspectRatio="none">
    <path id="bg-wave-sin" d="" fill="none" stroke="currentColor"/>
    <path id="bg-wave-cos" d="" fill="none" stroke="currentColor"/>
  </svg>
</div>

<!-- Legacy theme toggle — hidden but functional (JS may toggle this checkbox) -->
<label class="theme-slider" aria-hidden="true">
  <input type="checkbox" id="theme-toggle-btn" role="switch">
  <span class="theme-slider-track"><span class="theme-slider-thumb"></span></span>
</label>

<main class="stage">

  <!-- Top bar -->
  <div class="topbar">
    <span class="brand-mini">NeuroFocus</span>
    <div class="top-actions">
      <button class="icon-btn-quiet" id="theme-icon-btn" aria-label="Toggle theme">
        <!-- Sun (shown in light mode) -->
        <svg class="theme-icon-sun" viewBox="0 0 20 20"><path d="M10 3v2M10 15v2M3 10h2M15 10h2M5.6 5.6l1.4 1.4M13 13l1.4 1.4M5.6 14.4L7 13M13 7l1.4-1.4"/><circle cx="10" cy="10" r="3.2"/></svg>
        <!-- Moon (shown in dark mode) -->
        <svg class="theme-icon-moon" viewBox="0 0 20 20"><path d="M14.5 12.5A6 6 0 0 1 7.5 5.5a.5.5 0 0 0-.7-.6 7 7 0 1 0 8.3 8.3.5.5 0 0 0-.6-.7z" fill="currentColor" stroke="none"/></svg>
      </button>
      <button class="icon-btn-quiet" id="settings-icon-btn" aria-label="Settings">
        <!-- Gear / cog -->
        <svg viewBox="0 0 20 20"><circle cx="10" cy="10" r="2.4"/><path d="M16.6 11.6 18 10l-1.4-1.6.4-2.2-2.1-.8-.8-2.1L11.9 4 10 2.6 8.1 4l-2.2-.4-.8 2.1-2.1.8.4 2.2L2 10l1.4 1.6-.4 2.2 2.1.8.8 2.1L8.1 16 10 17.4 11.9 16l2.2.4.8-2.1 2.1-.8z"/></svg>
      </button>
    </div>
  </div>

  <!-- Center: the calm screen -->
  <section class="calm">
    <div class="session-label" id="session-label">classic · 25 min</div>

    <div class="time-display" id="time-display">25:00</div>

    <div class="phase-line">begin where you are</div>

    <button class="play-btn-calm" id="pause-btn" aria-label="Start">
      <svg id="play-icon" viewBox="0 0 24 24" fill="currentColor">
        <path d="M8 5v14l11-7z"/>
      </svg>
      <svg id="pause-icon" viewBox="0 0 24 24" fill="currentColor" style="display:none;margin-left:0;">
        <rect x="6" y="5" width="4" height="14" rx="1"/><rect x="14" y="5" width="4" height="14" rx="1"/>
      </svg>
    </button>

    <div class="run-controls" id="run-controls">
      <button class="side-control" id="skip-btn" aria-label="Skip">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 4 15 12 5 20 5 4" fill="currentColor"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
      </button>
      <button class="side-control success" id="good-enough-btn" aria-label="End early">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      </button>
    </div>

    <div class="meta-strip">
      <span>round <strong id="round-display">1/4</strong></span>
      <span class="pip"></span>
      <span class="freq-readout" id="freq-readout">alpha · soft</span>
      <span class="pip"></span>
      <span><strong id="stat-today">0</strong> sits today</span>
    </div>

    <!-- Phase switcher (kept, restyled) -->
    <div class="mode-switcher" id="mode-switcher" role="tablist" aria-label="Phase" style="display:flex;gap:6px;margin-top:6px;">
      <button class="mode-switch-btn side-control" data-mode="focus" type="button" aria-label="Focus" title="Focus">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><circle cx="12" cy="12" r="8"/></svg>
      </button>
      <button class="mode-switch-btn side-control" data-mode="short" type="button" aria-label="Short break" title="Short break">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M17 8h1a4 4 0 1 1 0 8h-1"/><path d="M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4Z"/></svg>
      </button>
      <button class="mode-switch-btn side-control" data-mode="long" type="button" aria-label="Long break" title="Long break">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M2 9V6a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v3"/><path d="M2 11h20v6a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2v-6Z"/></svg>
      </button>
      <span class="live-indicator" id="live-indicator" aria-hidden="true"></span>
    </div>
  </section>

  <!-- Drawer handle -->
  <div class="drawer-handle" id="drawer-open">
    <div class="grab"></div>
    <div class="lbl">sound · presets · journey · notes</div>
  </div>

  <!-- Hidden but present (JS reaches in) -->
  <div class="hidden-keep" aria-hidden="true">
    <span id="session-counter">1</span>
    <span id="stat-minutes">0</span>
    <span id="stat-streak">0</span>
    <span id="stat-total">0</span>
    <svg viewBox="0 0 280 280"><circle id="ring-progress" cx="140" cy="140" r="128" stroke-dasharray="804.25"/></svg>
    <button id="reset-btn" type="button"></button>
  </div>

</main>

<!-- Drawer -->
<aside class="drawer" id="drawer">
  <div class="drawer-grab" id="drawer-grab"></div>

  <div class="drawer-tabs">
    <button class="drawer-tab active" data-tab="sound">sound</button>
    <button class="drawer-tab" data-tab="presets">presets</button>
    <button class="drawer-tab" data-tab="journey">journey</button>
    <button class="drawer-tab" data-tab="notes">notes</button>
  </div>

  <div class="drawer-content">

    <!-- SOUND tab -->
    <section class="panel-section active" data-tab-panel="sound">
      <div class="panel-title">Atmosphere</div>

      <!-- Brainwave entrainment list (binaural / isochronic) -->
      <div class="entrainment-panel" id="entrainment-panel">
        <div class="entrain-list">
          <button class="entrain-item" data-audio-mode="binaural" type="button">
            <span class="icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 18v-6a9 9 0 0118 0v6"/>
                <path d="M21 19a2 2 0 01-2 2h-1v-7h3v5zM3 19a2 2 0 002 2h1v-7H3v5z"/>
              </svg>
            </span>
            <span class="info">
              <span class="name">Binaural</span>
              <span class="desc">Two tones, one per ear — needs headphones</span>
            </span>
            <svg class="check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
          </button>
          <button class="entrain-item" data-audio-mode="isochronic" type="button">
            <span class="icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                <line x1="3" y1="12" x2="6" y2="12"/>
                <line x1="9" y1="6" x2="9" y2="18"/>
                <line x1="12" y1="9" x2="12" y2="15"/>
                <line x1="15" y1="6" x2="15" y2="18"/>
                <line x1="18" y1="9" x2="18" y2="15"/>
              </svg>
            </span>
            <span class="info">
              <span class="name">Isochronic</span>
              <span class="desc">Pulsed single tone — works on speakers</span>
            </span>
            <svg class="check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
          </button>
        </div>
      </div>

      <!-- Volume mixer — fader-channel rows -->
      <div class="mixer-panel" id="mixer-panel" style="margin-top:18px;">
        <div class="mixer-faders">
          <div class="fader-channel master">
            <div class="fader-icon"></div>
            <div class="fader-label">Master</div>
            <div class="fader-track">
              <input class="fader" id="master-volume" type="range" min="0" max="100" value="100" step="1" />
            </div>
            <div class="fader-value" id="master-volume-out">100</div>
          </div>
          <div class="fader-channel" data-channel="brainwave">
            <div class="fader-icon"></div>
            <div class="fader-label">Wave</div>
            <div class="fader-track">
              <input class="fader" id="volume-slider" type="range" min="0" max="100" value="25" step="1" />
            </div>
            <div class="fader-value" id="volume-out">25</div>
          </div>
          <div class="fader-channel" data-channel="nature">
            <div class="fader-icon"></div>
            <div class="fader-label">Nature</div>
            <div class="fader-track">
              <input class="fader" id="nature-volume" type="range" min="0" max="100" value="40" step="1" />
            </div>
            <div class="fader-value" id="nature-volume-out">40</div>
          </div>
          <div class="fader-channel" data-channel="radio">
            <div class="fader-icon"></div>
            <div class="fader-label">Radio</div>
            <div class="fader-track">
              <input class="fader" id="radio-volume" type="range" min="0" max="100" value="50" step="1" />
            </div>
            <div class="fader-value" id="radio-volume-out">50</div>
          </div>
        </div>
      </div>

      <!-- Nature / radio panels — content injected by JS, kept as containers -->
      <div class="nature-panel" id="nature-panel" style="margin-top:18px;">
        <div class="nature-grid" id="nature-grid"></div>
      </div>
      <div class="radio-panel" id="radio-panel" style="margin-top:18px;">
        <div class="radio-list" id="radio-list"></div>
      </div>
    </section>

    <!-- PRESETS tab -->
    <section class="panel-section" data-tab-panel="presets" style="display:none;">
      <div class="panel-title">Session length</div>
      <div class="interval-grid">
        <button class="interval-card" data-f="15" data-s="3" data-l="15">
          <span class="label">Sprint</span><span class="val">15/3</span>
        </button>
        <button class="interval-card active" data-f="25" data-s="5" data-l="20">
          <span class="label">Classic</span><span class="val">25/5</span>
        </button>
        <button class="interval-card" data-f="50" data-s="10" data-l="30">
          <span class="label">Deep</span><span class="val">50/10</span>
        </button>
        <button class="interval-card custom-card custom-add" id="custom-card" aria-label="Custom">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          <span class="val" id="custom-card-val">30/5</span>
        </button>
      </div>
    </section>

    <!-- JOURNEY tab -->
    <section class="panel-section" data-tab-panel="journey" style="display:none;">
      <div class="panel-title">Journey</div>
      <div class="journey-bar" id="journey-bar"></div>
      <div class="band-selector-wrap" id="band-selector-wrap">
        <div class="band-selector" id="band-selector"></div>
      </div>
      <div class="journey-timeline hidden" id="journey-timeline"></div>
    </section>

    <!-- NOTES tab — brain dump -->
    <section class="panel-section" data-tab-panel="notes" style="display:none;">
      <div class="section">
        <div class="section-head">
          <p class="section-title">Thought parking</p>
          <span style="font-size: 11px; color: var(--ink-muted);">Capture, return to focus</span>
        </div>
        <div class="dump-box">
          <div class="dump-input-row">
            <input type="text" id="dump-input" placeholder="Capture an intrusive thought..." />
            <button class="dump-add-btn" id="dump-add">+</button>
          </div>
          <ul class="dump-list" id="dump-list"></ul>
          <p class="dump-empty" id="dump-empty">Mind is clear.</p>
        </div>
      </div>
    </section>

  </div>
</aside>

<!-- Trash zone -->
<div class="trash-zone" id="trash-zone" aria-hidden="true">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="3 6 5 6 21 6"/>
    <path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/>
    <path d="M10 11v6M14 11v6"/>
    <path d="M9 6V4a2 2 0 012-2h2a2 2 0 012 2v2"/>
  </svg>
  <div class="trash-label">crumple</div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay" role="dialog" aria-modal="true">
  <div class="modal" id="modal">
    <button class="modal-close" id="modal-close" aria-label="Close">×</button>
    <div class="modal-handle"></div>
    <div id="modal-content"></div>
  </div>
</div>

<!-- Drawer + theme bridge — runs BEFORE the legacy script block so the
     theme-icon button can drive the legacy theme-toggle-btn checkbox. -->
<script src="app.js" defer></script>

</body>
</html>
