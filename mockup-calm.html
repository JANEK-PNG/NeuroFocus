<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Neurosync — Calm (mockup)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..600;1,9..144,300..600&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    /* Light · default · warm off-white + soft chromatic wash */
    --paper:        #F4EFE6;   /* warm off-white, slightly cream */
    --paper-elev:   #FBF7EE;
    --ink:          #2B2620;   /* near-black ink, warm cast */
    --ink-soft:     #5A5147;
    --ink-muted:    #8A7F70;
    --ink-faint:    #B8AE9C;
    --line:         rgba(43,38,32,.10);
    --line-strong:  rgba(43,38,32,.18);

    /* Atmospheric wash colors — drifted behind the timer */
    --wash-a: #F3D9C0;   /* dawn peach */
    --wash-b: #E4C8C2;   /* dusty rose */
    --wash-c: #C9D2C4;   /* sage haze */
    --wash-d: #E8DCC0;   /* sand */

    /* One accent — used sparingly. Matcha rather than mint-neon. */
    --accent:       #6E7F6A;
    --accent-deep:  #4E5C4B;
    --accent-soft:  rgba(110,127,106,.10);

    --serif:        'Fraunces', Georgia, serif;
    --sans:         'Manrope', system-ui, -apple-system, sans-serif;

    --r-sm: 12px;
    --r:    20px;
    --r-lg: 28px;
    --r-xl: 36px;
  }
  [data-theme="dark"] {
    --paper:        #15110D;
    --paper-elev:   #1D1814;
    --ink:          #ECE6D8;
    --ink-soft:     #B8AE9C;
    --ink-muted:    #786F60;
    --ink-faint:    #4A443A;
    --line:         rgba(236,230,216,.08);
    --line-strong:  rgba(236,230,216,.14);

    --wash-a: #3A2A28;
    --wash-b: #2E2A38;
    --wash-c: #25302C;
    --wash-d: #2A2418;

    --accent:       #9DB098;
    --accent-deep:  #B6C6B0;
    --accent-soft:  rgba(157,176,152,.10);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--paper); color: var(--ink); font-family: var(--sans); font-weight: 400; }
  body {
    min-height: 100vh;
    overflow-x: hidden;
    overflow-y: auto;
    position: relative;
  }

  /* ───────────────────────────────────────────────────────────
     Atmospheric wash · drifting chromatic gradient blobs
     ─────────────────────────────────────────────────────────── */
  .atmosphere {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    overflow: hidden;
  }
  .atmosphere::before,
  .atmosphere::after {
    content: ""; position: absolute;
    width: 110vmin; height: 110vmin; border-radius: 50%;
    filter: blur(80px);
    opacity: .55;
    mix-blend-mode: multiply;
  }
  [data-theme="dark"] .atmosphere::before,
  [data-theme="dark"] .atmosphere::after {
    mix-blend-mode: screen;
    opacity: .35;
  }
  .atmosphere::before {
    background: radial-gradient(circle, var(--wash-a) 0%, transparent 60%);
    top: -30vmin; left: -20vmin;
    animation: driftA 28s ease-in-out infinite alternate;
  }
  .atmosphere::after {
    background: radial-gradient(circle, var(--wash-c) 0%, transparent 60%);
    bottom: -30vmin; right: -25vmin;
    animation: driftB 36s ease-in-out infinite alternate;
  }
  .wash-c {
    position: fixed; top: 30%; left: 50%; transform: translateX(-50%);
    width: 80vmin; height: 80vmin; border-radius: 50%;
    background: radial-gradient(circle, var(--wash-b) 0%, transparent 65%);
    filter: blur(90px); opacity: .35; mix-blend-mode: multiply;
    z-index: 0; pointer-events: none;
    animation: driftC 44s ease-in-out infinite alternate;
  }
  [data-theme="dark"] .wash-c { mix-blend-mode: screen; opacity: .25; }

  @keyframes driftA {
    from { transform: translate(0, 0) scale(1); }
    to   { transform: translate(8vmin, 6vmin) scale(1.1); }
  }
  @keyframes driftB {
    from { transform: translate(0, 0) scale(1); }
    to   { transform: translate(-10vmin, -4vmin) scale(1.08); }
  }
  @keyframes driftC {
    from { transform: translate(-50%, 0) scale(1); }
    to   { transform: translate(-46%, 4vmin) scale(1.12); }
  }

  /* ───────────────────────────────────────────────────────────
     Layout
     ─────────────────────────────────────────────────────────── */
  .stage {
    position: relative; z-index: 1;
    min-height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr auto;
    padding: 32px 32px 28px;
    max-width: 720px;
    margin: 0 auto;
  }

  /* ── Top bar — quiet ── */
  .topbar {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 12px; letter-spacing: .14em; text-transform: uppercase;
    color: var(--ink-muted);
  }
  .brand {
    font-family: var(--serif); font-style: italic; font-weight: 400;
    font-size: 19px; letter-spacing: .005em; text-transform: none;
    color: var(--ink);
  }
  .top-actions { display: flex; gap: 14px; align-items: center; }
  .icon-btn {
    width: 36px; height: 36px; border-radius: 50%;
    border: 1px solid var(--line); background: transparent;
    display: flex; align-items: center; justify-content: center;
    color: var(--ink-muted); cursor: pointer;
    transition: color 180ms ease, border-color 180ms ease, background 180ms ease;
  }
  .icon-btn:hover { color: var(--ink); border-color: var(--line-strong); background: var(--paper-elev); }
  .icon-btn svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 1.4; }

  /* ── Center stage — the calm screen ── */
  .calm {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 36px;
    padding: 48px 24px;
  }

  .session-label {
    font-family: var(--serif); font-style: italic;
    font-size: 17px; color: var(--ink-muted);
    letter-spacing: .01em;
  }

  .time {
    font-family: var(--serif);
    font-weight: 300;
    font-variation-settings: 'opsz' 144;
    font-size: 168px;
    line-height: .95;
    letter-spacing: -.025em;
    color: var(--ink);
    font-feature-settings: 'tnum', 'ss01';
    user-select: none;
  }
  .time .colon {
    color: var(--ink-faint);
    font-style: italic;
    margin: 0 .04em;
  }

  .phase {
    font-family: var(--serif); font-style: italic; font-weight: 400;
    font-size: 18px; color: var(--ink-soft);
    letter-spacing: .005em;
  }

  /* One button — large, calm, the only required action */
  .play {
    width: 88px; height: 88px;
    border-radius: 50%;
    background: var(--ink);
    color: var(--paper);
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 16px 40px -16px rgba(43,38,32,.45);
    transition: transform 220ms ease, box-shadow 220ms ease;
    position: relative;
  }
  .play:hover { transform: translateY(-2px); box-shadow: 0 22px 48px -18px rgba(43,38,32,.55); }
  .play:active { transform: translateY(0); }
  .play::before {
    content: ""; position: absolute; inset: -10px;
    border-radius: 50%;
    border: 1px solid var(--line);
    animation: breathe 5s ease-in-out infinite;
  }
  .play svg { width: 30px; height: 30px; fill: currentColor; margin-left: 4px; }

  @keyframes breathe {
    0%, 100% { transform: scale(1); opacity: .8; }
    50%      { transform: scale(1.06); opacity: .35; }
  }

  /* Tiny meta strip beneath play — at-rest only */
  .meta-strip {
    display: flex; gap: 24px; align-items: center;
    color: var(--ink-muted); font-size: 12px; letter-spacing: .08em;
  }
  .meta-strip .dot { width: 4px; height: 4px; border-radius: 50%; background: var(--ink-faint); }
  .meta-strip strong { color: var(--ink-soft); font-weight: 500; }

  /* ── Bottom: drawer handle ── */
  .drawer-handle {
    margin-top: auto;
    align-self: center;
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    cursor: pointer;
    padding: 12px 18px;
    color: var(--ink-muted);
    transition: color 180ms ease;
  }
  .drawer-handle:hover { color: var(--ink); }
  .drawer-handle .grab {
    width: 36px; height: 4px; border-radius: 2px;
    background: var(--ink-faint);
  }
  .drawer-handle .lbl {
    font-family: var(--serif); font-style: italic; font-size: 13px;
    letter-spacing: .02em;
  }

  /* ── Drawer (peek state shown in mockup) ── */
  .drawer {
    position: fixed; left: 0; right: 0; bottom: 0;
    background: var(--paper-elev);
    border-top: 1px solid var(--line);
    border-radius: var(--r-xl) var(--r-xl) 0 0;
    box-shadow: 0 -24px 60px -28px rgba(43,38,32,.20);
    padding: 24px 28px 32px;
    z-index: 10;
    transform: translateY(calc(100% - 64px));
    transition: transform 380ms cubic-bezier(.2,.7,.2,1);
  }
  .drawer.open { transform: translateY(0); }
  .drawer-grab {
    width: 44px; height: 5px; border-radius: 3px;
    background: var(--ink-faint); opacity: .5;
    margin: 0 auto 18px; cursor: pointer;
  }
  .drawer-tabs {
    display: flex; gap: 8px; justify-content: center;
    margin-bottom: 24px;
  }
  .tab {
    padding: 9px 18px; border-radius: 999px;
    border: 1px solid var(--line); background: transparent;
    font-family: var(--sans); font-size: 13px; color: var(--ink-muted);
    cursor: pointer; letter-spacing: .01em;
    transition: all 180ms ease;
  }
  .tab:hover { color: var(--ink); border-color: var(--line-strong); }
  .tab.active {
    background: var(--ink); color: var(--paper); border-color: var(--ink);
  }

  .drawer-content {
    max-width: 720px; margin: 0 auto;
    display: grid; gap: 22px;
  }

  /* Panel — sounds */
  .panel-title {
    font-family: var(--serif); font-style: italic;
    font-size: 22px; color: var(--ink);
  }
  .sound-row {
    display: grid; grid-template-columns: 90px 1fr 44px; gap: 16px;
    align-items: center;
    padding: 12px 0;
    border-bottom: 1px solid var(--line);
  }
  .sound-row:last-child { border-bottom: none; }
  .sound-label {
    font-family: var(--serif); font-style: italic;
    font-size: 16px; color: var(--ink);
  }
  .sound-slider {
    height: 4px; background: var(--line);
    border-radius: 999px; position: relative;
  }
  .sound-slider .fill {
    position: absolute; left: 0; top: 0; bottom: 0;
    border-radius: 999px;
    background: var(--accent);
  }
  .sound-slider .knob {
    position: absolute; top: 50%; transform: translate(-50%, -50%);
    width: 16px; height: 16px; border-radius: 50%;
    background: var(--paper); border: 1.5px solid var(--accent);
    box-shadow: 0 2px 6px rgba(43,38,32,.18);
  }
  .sound-icon {
    width: 36px; height: 36px; border-radius: 50%;
    border: 1px solid var(--line);
    display: flex; align-items: center; justify-content: center;
    color: var(--ink-muted);
  }
  .sound-icon svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 1.4; }
  .sound-icon.on { color: var(--accent-deep); border-color: var(--accent); background: var(--accent-soft); }

  /* Hide the dev annotations on small screens / make optional */
  .annot {
    position: absolute; right: -260px; top: 40%;
    width: 220px;
    font-family: var(--serif); font-style: italic;
    font-size: 13px; line-height: 1.5; color: var(--ink-muted);
    border-left: 1px solid var(--line);
    padding-left: 18px;
    display: none;
  }
  body.show-annot .annot { display: block; }

  /* Toolbar (dev-only, hidden in print) */
  .toolbar {
    position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
    background: rgba(20,16,12,.92); color: #ECE6D8;
    border-radius: 999px; padding: 10px 14px; display: flex; gap: 8px; align-items: center;
    font-size: 11px; letter-spacing: .12em; text-transform: uppercase;
    z-index: 100; backdrop-filter: blur(8px);
  }
  .toolbar button {
    border: 1px solid rgba(255,255,255,.16); background: transparent; color: inherit;
    padding: 6px 12px; border-radius: 999px; cursor: pointer; font: inherit;
    letter-spacing: inherit; text-transform: inherit;
  }
  .toolbar button:hover { background: rgba(255,255,255,.08); }
  .toolbar .sep { width: 1px; height: 14px; background: rgba(255,255,255,.2); margin: 0 4px; }
</style>
</head>
<body>

<div class="atmosphere"></div>
<div class="wash-c"></div>

<main class="stage">

  <!-- ── Top: brand + minimal actions ── -->
  <div class="topbar">
    <span class="brand">Neurosync</span>
    <div class="top-actions">
      <button class="icon-btn" aria-label="Theme" id="theme-toggle">
        <svg viewBox="0 0 20 20"><path d="M10 3v2M10 15v2M3 10h2M15 10h2M5.6 5.6l1.4 1.4M13 13l1.4 1.4M5.6 14.4L7 13M13 7l1.4-1.4"/><circle cx="10" cy="10" r="3.2"/></svg>
      </button>
      <button class="icon-btn" aria-label="Settings">
        <svg viewBox="0 0 20 20"><circle cx="10" cy="10" r="2.2"/><path d="M10 2v2M10 16v2M2 10h2M16 10h2M4.3 4.3l1.4 1.4M14.3 14.3l1.4 1.4M4.3 15.7l1.4-1.4M14.3 5.7l1.4-1.4"/></svg>
      </button>
    </div>
  </div>

  <!-- ── Center: the calm screen ── -->
  <section class="calm">
    <div class="session-label">classic · 25 min</div>

    <div class="time">
      <span>25</span><span class="colon">:</span><span>00</span>
    </div>

    <div class="phase">begin where you are</div>

    <button class="play" aria-label="Begin">
      <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
    </button>

    <div class="meta-strip">
      <span><strong>1</strong> of 4</span>
      <span class="dot"></span>
      <span>alpha · soft</span>
      <span class="dot"></span>
      <span><strong>3</strong> sits today</span>
    </div>
  </section>

  <!-- ── Bottom: drawer handle ── -->
  <div class="drawer-handle" id="drawer-open">
    <div class="grab"></div>
    <div class="lbl">sound · presets · journey</div>
  </div>

</main>

<!-- ── Drawer (peek state by default) ── -->
<aside class="drawer" id="drawer">
  <div class="drawer-grab" id="drawer-grab"></div>

  <div class="drawer-tabs">
    <button class="tab active">sound</button>
    <button class="tab">presets</button>
    <button class="tab">journey</button>
    <button class="tab">notes</button>
  </div>

  <div class="drawer-content">
    <div class="panel-title">Atmosphere</div>

    <div class="sound-row">
      <div class="sound-label">brainwave</div>
      <div class="sound-slider">
        <div class="fill" style="width: 55%"></div>
        <div class="knob" style="left: 55%"></div>
      </div>
      <div class="sound-icon on" title="On">
        <svg viewBox="0 0 20 20"><path d="M4 7v6M7 5v10M10 3v14M13 5v10M16 7v6"/></svg>
      </div>
    </div>

    <div class="sound-row">
      <div class="sound-label">rain</div>
      <div class="sound-slider">
        <div class="fill" style="width: 38%"></div>
        <div class="knob" style="left: 38%"></div>
      </div>
      <div class="sound-icon on" title="On">
        <svg viewBox="0 0 20 20"><path d="M5 12a4 4 0 0 1 0-8 4 4 0 0 1 7 1 3 3 0 0 1 3 5"/><path d="M7 16l-1 2M11 16l-1 2M15 16l-1 2"/></svg>
      </div>
    </div>

    <div class="sound-row">
      <div class="sound-label">forest</div>
      <div class="sound-slider">
        <div class="fill" style="width: 0%"></div>
        <div class="knob" style="left: 0%"></div>
      </div>
      <div class="sound-icon" title="Off">
        <svg viewBox="0 0 20 20"><path d="M10 17V8M6 11l4-4 4 4M5 17h10"/></svg>
      </div>
    </div>

    <div class="sound-row">
      <div class="sound-label">radio</div>
      <div class="sound-slider">
        <div class="fill" style="width: 0%"></div>
        <div class="knob" style="left: 0%"></div>
      </div>
      <div class="sound-icon" title="Off">
        <svg viewBox="0 0 20 20"><circle cx="10" cy="10" r="6"/><path d="M10 10l3-3"/></svg>
      </div>
    </div>
  </div>
</aside>

<!-- Dev toolbar -->
<div class="toolbar">
  <button id="theme-btn">theme</button>
  <span class="sep"></span>
  <button id="drawer-btn">drawer</button>
  <span class="sep"></span>
  <button id="annot-btn">annot</button>
</div>

<script>
  const root = document.documentElement;
  const drawer = document.getElementById('drawer');
  const themeBtn = document.getElementById('theme-btn');
  const themeIcon = document.getElementById('theme-toggle');
  const drawerBtn = document.getElementById('drawer-btn');
  const drawerOpen = document.getElementById('drawer-open');
  const drawerGrab = document.getElementById('drawer-grab');
  const annotBtn = document.getElementById('annot-btn');

  function toggleTheme() {
    const cur = root.getAttribute('data-theme') || 'light';
    root.setAttribute('data-theme', cur === 'light' ? 'dark' : 'light');
  }
  themeBtn.addEventListener('click', toggleTheme);
  themeIcon.addEventListener('click', toggleTheme);

  function toggleDrawer() { drawer.classList.toggle('open'); }
  drawerBtn.addEventListener('click', toggleDrawer);
  drawerOpen.addEventListener('click', toggleDrawer);
  drawerGrab.addEventListener('click', toggleDrawer);

  annotBtn.addEventListener('click', () => document.body.classList.toggle('show-annot'));

  // Tab switch — visual only for mockup
  document.querySelectorAll('.drawer-tabs .tab').forEach(t => {
    t.addEventListener('click', () => {
      document.querySelectorAll('.drawer-tabs .tab').forEach(x => x.classList.remove('active'));
      t.classList.add('active');
    });
  });
</script>
</body>
</html>
